<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course Business Manager Dashboard</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #b45309;
      --red: #b91c1c;
      --gray: #475467;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.4;
    }

    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      padding: 24px 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .metric,
    .panel,
    .task-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric {
      padding: 16px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
    }

    .next-task {
      border-left: 4px solid var(--blue);
      padding: 16px 18px;
      margin-bottom: 20px;
    }

    .next-task h2,
    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .next-task p {
      margin: 4px 0;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(4, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .column {
      background: #eef1f5;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 220px;
    }

    .column h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--gray);
    }

    .task-card {
      padding: 12px;
      margin-bottom: 10px;
    }

    .task-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .task-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #edf2f7;
      color: var(--gray);
    }

    .priority-high {
      background: #fee2e2;
      color: var(--red);
    }

    .priority-medium {
      background: #fef3c7;
      color: var(--amber);
    }

    .priority-low {
      background: #dcfce7;
      color: var(--green);
    }

    .panel {
      padding: 16px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 980px) {
      header,
      main {
        padding-left: 18px;
        padding-right: 18px;
      }

      .summary,
      .kanban {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Course Business Manager Dashboard</h1>
    <p class="subtitle">Visual progress board for the project task stream.</p>
  </header>

  <main>
    <section class="summary" aria-label="Project summary">
      <div class="metric">
        <div class="metric-label">Total Tasks</div>
        <div class="metric-value" id="totalTasks">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Done</div>
        <div class="metric-value" id="doneTasks">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Remaining</div>
        <div class="metric-value" id="remainingTasks">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">High Priority</div>
        <div class="metric-value" id="highPriorityTasks">0</div>
      </div>
    </section>

    <section class="panel next-task" aria-label="Next recommended task">
      <h2>Next Recommended Task</h2>
      <div id="nextTask"></div>
    </section>

    <section class="kanban" id="kanban" aria-label="Task kanban board"></section>

    <section class="panel" aria-label="Task table">
      <h2>Task Table</h2>
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Work Stream</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Required Tool</th>
            <th>Next Action</th>
          </tr>
        </thead>
        <tbody id="taskTable"></tbody>
      </table>
    </section>
  </main>

  <script>
    const tasks = [
      {
        task: "Build Operations & Future Task Planning work stream",
        workStream: "Operations",
        priority: "High",
        status: "Not started",
        requiredTool: "Task board, checklist, calendar, docs, approval tracker",
        nextAction: "Create backlog, priorities, timeline, owners, statuses, and next actions"
      },
      {
        task: "Build Communication Drafting work stream",
        workStream: "Communication",
        priority: "High",
        status: "Not started",
        requiredTool: "Email templates, WhatsApp templates, LinkedIn DM templates, CRM notes, review checklist",
        nextAction: "Create draft-only message templates and review workflow"
      },
      {
        task: "Build Student Support & Community work stream",
        workStream: "Student Support",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Community platform, feedback forms, support reply templates, testimonial forms",
        nextAction: "Create support reply, engagement, feedback, and testimonial workflows"
      },
      {
        task: "Build Curriculum & Course Planning work stream",
        workStream: "Curriculum",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Course outline doc, module planner, learning outcome framework, schedule planner",
        nextAction: "Create course outline, module, lesson, assignment, and capstone workflow"
      },
      {
        task: "Build Lesson Content & Teaching Scripts work stream",
        workStream: "Lesson Content",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Lesson script template, examples library, video script doc, teaching notes",
        nextAction: "Create lesson script, class flow, examples, recap, and homework workflow"
      },
      {
        task: "Build Learning Materials & Assessment work stream",
        workStream: "Learning Materials",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Slides tool, workbook/doc tool, quiz builder, rubric template, certificate criteria",
        nextAction: "Create slides, workbook, quiz, rubric, assignment, and certificate workflow"
      },
      {
        task: "Build Marketing & Content Repurposing work stream",
        workStream: "Marketing",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Content calendar, LinkedIn tools, Instagram tools, YouTube tools, SEO tool, newsletter tool",
        nextAction: "Create content calendar, platform posts, scripts, newsletters, and repurposing workflow"
      },
      {
        task: "Build Sales Funnel & Offer work stream",
        workStream: "Sales",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Landing page builder, pricing model, webinar tool, checkout platform, FAQ tracker",
        nextAction: "Create offer, pricing, funnel, landing page, webinar, objections, and FAQ workflow"
      },
      {
        task: "Build Course Strategy & Market Research work stream",
        workStream: "Strategy",
        priority: "Medium",
        status: "Not started",
        requiredTool: "Web research, competitor research, survey/forms, positioning canvas, pricing research",
        nextAction: "Create validation, audience, competitor, positioning, promise, and pricing workflow"
      },
      {
        task: "Build Analytics & Business Intelligence work stream",
        workStream: "Analytics",
        priority: "Low",
        status: "Not started",
        requiredTool: "Spreadsheet/dashboard tool, sales data, lead data, campaign metrics, feedback analysis",
        nextAction: "Create KPI dashboard, reports, conversion analysis, feedback insights, and recommendations workflow"
      },
      {
        task: "Build Agent-Building & Improvement work stream",
        workStream: "Agent-Building",
        priority: "Low",
        status: "Not started",
        requiredTool: "Instruction files, routing logic, test prompts, evaluation checklist, version control",
        nextAction: "Create improvement workflow for instructions, routing, tests, and evaluation"
      }
    ];

    const statuses = ["Not started", "In progress", "Waiting", "Done"];
    const priorityRank = { High: 1, Medium: 2, Low: 3 };

    function priorityClass(priority) {
      return `priority-${priority.toLowerCase()}`;
    }

    function getNextTask() {
      return tasks
        .filter((task) => task.status !== "Done")
        .sort((a, b) => priorityRank[a.priority] - priorityRank[b.priority])[0];
    }

    function renderSummary() {
      const total = tasks.length;
      const done = tasks.filter((task) => task.status === "Done").length;
      const high = tasks.filter((task) => task.priority === "High" && task.status !== "Done").length;

      document.getElementById("totalTasks").textContent = total;
      document.getElementById("doneTasks").textContent = done;
      document.getElementById("remainingTasks").textContent = total - done;
      document.getElementById("highPriorityTasks").textContent = high;
    }

    function renderNextTask() {
      const nextTask = getNextTask();
      const container = document.getElementById("nextTask");

      if (!nextTask) {
        container.innerHTML = "<p>All tasks are complete.</p>";
        return;
      }

      container.innerHTML = `
        <p><strong>${nextTask.task}</strong></p>
        <p>Work stream: ${nextTask.workStream}</p>
        <p>Next action: ${nextTask.nextAction}</p>
      `;
    }

    function renderKanban() {
      const board = document.getElementById("kanban");

      board.innerHTML = statuses.map((status) => {
        const cards = tasks
          .filter((task) => task.status === status)
          .map((task) => `
            <article class="task-card">
              <div class="task-title">${task.task}</div>
              <div class="task-meta">${task.workStream}</div>
              <div class="badges">
                <span class="badge ${priorityClass(task.priority)}">${task.priority}</span>
                <span class="badge">${task.requiredTool}</span>
              </div>
            </article>
          `).join("");

        return `
          <section class="column">
            <h3>${status}</h3>
            ${cards || '<div class="task-meta">No tasks</div>'}
          </section>
        `;
      }).join("");
    }

    function renderTable() {
      const table = document.getElementById("taskTable");

      table.innerHTML = tasks.map((task) => `
        <tr>
          <td>${task.task}</td>
          <td>${task.workStream}</td>
          <td><span class="badge ${priorityClass(task.priority)}">${task.priority}</span></td>
          <td>${task.status}</td>
          <td>${task.requiredTool}</td>
          <td>${task.nextAction}</td>
        </tr>
      `).join("");
    }

    renderSummary();
    renderNextTask();
    renderKanban();
    renderTable();
  </script>
</body>
</html>
